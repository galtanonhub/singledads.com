---
deployment:
  tasks:
    # cPanel runs these when it deploys the repo.
    # The site is pre-built into _site/ (committed), so we just copy that whole
    # tree — index.html, style.css, the icons, 404.html, .htaccess, robots.txt,
    # sitemap.xml, and every generated page (e.g. legal/custody/).
    - export DEPLOYPATH=/home/singledads/public_html/test/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R _site/. $DEPLOYPATH
