<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Single Dads</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#141820">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141820;
      --text: #e8e8e6;
      --text-dim: #9aa0b0;
      --cream: #f0e7d4;
      --accent: #c9a96e;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    html { font-size: 16px; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image: conic-gradient(
        rgba(255,255,255,0.014) 25%, transparent 0 50%,
        rgba(255,255,255,0.014) 0 75%, transparent 0
      );
      background-size: 220px 220px;
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,1));
      mask-image: linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,1));
    }
    .logo {
      padding: 1.75rem 2.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 2.5rem 5rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .code {
      font-size: clamp(5rem, 16vw, 11rem);
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--cream);
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }
    p {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--text-dim);
      max-width: 480px;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--bg);
      background: var(--cream);
      padding: 0.85rem 2rem;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent); }
  </style>
</head>
<body>
  <!-- update href to "/" at launch (site currently lives in /test/) -->
  <a href="/test/" class="logo">Single Dads</a>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page took a sick day.</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back to solid ground.</p>
    <a href="/test/" class="btn">Back to Home</a>
  </div>
</body>
</html>
