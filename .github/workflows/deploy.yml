name: Deploy to cPanel via FTP

# Runs automatically on every push to main
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # also lets you trigger it manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload site to the /test/ folder via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The folder on your host to deploy into. Adjust to match your real path.
          server-dir: ./public_html/test/
          # Only deploy the actual site files (not git/CI/docs files)
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            coming-soon.html
            pr-body.txt
            README.md
