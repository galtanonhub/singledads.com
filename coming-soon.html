<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Dads — Coming Soon</title>
  <meta name="description" content="SingleDads.com is coming soon — a resource for fathers raising kids on their own.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141820;
      --text: #e8e8e6;
      --text-dim: #9aa0b0;
      --cream: #f0e7d4;
      --accent: #c9a96e;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    html { font-size: 16px; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image: conic-gradient(
        rgba(255,255,255,0.014) 25%, transparent 0 50%,
        rgba(255,255,255,0.014) 0 75%, transparent 0
      );
      background-size: 220px 220px;
      -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,1));
      mask-image: linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,1));
    }
    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2.5rem 4rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .logo {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: auto;
      padding-top: 1rem;
    }
    .eyebrow {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2rem;
    }
    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 0.98;
      margin-bottom: 2rem;
    }
    h1 .cream { color: var(--cream); }
    .lead {
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--text-dim);
      max-width: 540px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1.75rem;
    }
    footer {
      padding: 1.5rem 2.5rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="logo">Single Dads</span>
    <div>
      <p class="eyebrow">A Resource for Fathers Raising Kids Alone</p>
      <h1>Coming<br><span class="cream">Soon.</span></h1>
      <p class="lead">We're building the resource we wish we'd had — practical help across every part of raising kids on your own. Check back soon.</p>
    </div>
  </div>
  <footer>© 2026 SingleDads.com</footer>
</body>
</html>
